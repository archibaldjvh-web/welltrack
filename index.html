<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WellTrack Pro — Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0d0f;--surface:#111518;--surface2:#181d21;--border:#222930;--border2:#2d3640;--accent:#e8a020;--adim:rgba(232,160,32,.12);--green:#4ade80;--gdim:rgba(74,222,128,.12);--blue:#38bdf8;--bdim:rgba(56,189,248,.12);--red:#f87171;--rdim:rgba(248,113,113,.12);--purple:#a855f7;--pdim:rgba(168,85,247,.12);--text:#e2e8f0;--text2:#94a3b8;--muted:#4a5568;--nav-h:64px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden;}

/* AUTH */
.auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 28px;width:100%;max-width:380px;}
.auth-logo{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;color:var(--accent);line-height:1;}
.auth-sub{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:28px;margin-top:3px;}
.auth-label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text2);display:block;margin-bottom:8px;font-weight:500;}
.auth-input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:15px 14px;color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:16px;outline:none;margin-bottom:16px;transition:border-color .15s;-webkit-appearance:none;}
.auth-input:focus{border-color:var(--accent);}
.auth-btn{width:100%;padding:16px;background:var(--accent);color:#000;font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:none;border-radius:10px;cursor:pointer;margin-top:4px;}
.auth-error{color:var(--red);font-family:'IBM Plex Mono',monospace;font-size:11px;margin-bottom:14px;display:none;padding:12px;background:var(--rdim);border-radius:8px;line-height:1.6;}

/* APP */
.app{display:none;min-height:100vh;padding-bottom:calc(var(--nav-h) + 10px);}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--accent);}
.topbar-right{display:flex;gap:8px;align-items:center;}
.topbar-email{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.logout-btn{width:36px;height:36px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:16px;}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;color:var(--muted);border:none;background:none;padding:6px 4px;}
.bn-item.active{color:var(--accent);}
.bn-icon{font-size:22px;line-height:1;}
.bn-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;}

/* CONTENT */
.content{padding:16px;}
.view{display:none;}
.view.active{display:block;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative;overflow:hidden;}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.stat-card.gold::after{background:var(--accent);}
.stat-card.green::after{background:var(--green);}
.stat-card.blue::after{background:var(--blue);}
.stat-card.red::after{background:var(--red);}
.stat-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);margin-bottom:8px;font-weight:500;}
.stat-value{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:1px;line-height:1;}
.stat-card.gold .stat-value{color:var(--accent);}
.stat-card.green .stat-value{color:var(--green);}
.stat-card.blue .stat-value{color:var(--blue);}
.stat-card.red .stat-value{color:var(--red);}
.stat-sub{font-size:11px;color:var(--text2);margin-top:5px;}

/* SECTION */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;margin-top:10px;}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--text);}

/* BUTTONS */
.btn{padding:10px 16px;border-radius:10px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;font-weight:600;}
.btn-primary{background:var(--accent);color:#000;}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn-sm{padding:8px 13px;font-size:10px;}
.btn-full{width:100%;justify-content:center;}
.btn-green{background:var(--gdim);border:1px solid var(--green);color:var(--green);}

/* DEAL CARDS */
.deal-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px;cursor:pointer;}
.deal-card:active{opacity:.85;}
.dc-inner{padding:16px;}
.dc-row1{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:3px;}
.dc-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;line-height:1.1;color:var(--text);}
.dc-loc{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text2);margin-bottom:14px;}
.prog-label{display:flex;justify-content:space-between;margin-bottom:6px;}
.prog-bar{height:5px;background:var(--border2);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;background:var(--accent);}
.prog-pct{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent);font-weight:600;}
.prog-amt{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text2);}
.dc-footer{padding:10px 16px;border-top:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:space-between;}
.dc-depth{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text2);}
.dc-actions{display:flex;gap:6px;}

/* STATUS */
.badge{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;}
.bdot{width:5px;height:5px;border-radius:50%;}
.s-drilling{background:var(--gdim);color:var(--green);}
.s-drilling .bdot{background:var(--green);animation:blink 1.4s infinite;}
.s-fundraising{background:var(--adim);color:var(--accent);}
.s-fundraising .bdot{background:var(--accent);}
.s-permitted{background:var(--bdim);color:var(--blue);}
.s-permitted .bdot{background:var(--blue);}
.s-completed{background:rgba(100,116,139,.15);color:#94a3b8;}
.s-completed .bdot{background:#94a3b8;}
.s-planning{background:var(--pdim);color:var(--purple);}
.s-planning .bdot{background:var(--purple);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

/* ICON BTN */
.ibtn{width:36px;height:36px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:14px;}

/* PANEL */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px;}
.panel-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface2);}
.panel-title{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;color:var(--text);}

/* UPDATE ITEMS */
.uitem{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:flex-start;}
.uitem:last-child{border-bottom:none;}
.uicon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.u-drill{background:var(--gdim);}
.u-doc{background:var(--bdim);}
.u-reg{background:var(--pdim);}
.u-fin{background:var(--adim);}
.udeal{font-size:11px;font-weight:600;color:var(--accent);font-family:'IBM Plex Mono',monospace;}
.utext{font-size:13px;margin-top:3px;line-height:1.5;color:var(--text);}
.utime{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text2);margin-top:3px;}

/* PROMOTER */
.prow{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.prow:last-child{border-bottom:none;}
.pavatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:15px;color:#000;flex-shrink:0;}
.pname{font-weight:600;font-size:14px;color:var(--text);}
.pmeta{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text2);margin-top:2px;}
.pactions{margin-left:auto;display:flex;gap:6px;}

/* ACCESS */
.acard{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden;}
.ahead{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--surface2);}
.achips{padding:12px 16px;display:flex;flex-wrap:wrap;gap:6px;}
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:10px;background:var(--adim);border:1px solid rgba(232,160,32,.25);color:var(--accent);}

/* SHEET */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(6px);}
.sheet-overlay.open{opacity:1;pointer-events:all;}
.sheet{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-height:93vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);}
.sheet-overlay.open .sheet{transform:translateY(0);}
.sheet-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:14px auto 0;}
.sheet-head{padding:16px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.sheet-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--text);}
.sheet-x{background:none;border:none;color:var(--text2);font-size:24px;cursor:pointer;line-height:1;padding:2px 6px;}
.sheet-body{padding:20px;}
.sheet-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:10px;}
.sheet-footer .btn{flex:1;justify-content:center;}

/* FIELDS */
.field{margin-bottom:18px;}
.field label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text2);display:block;margin-bottom:8px;font-weight:500;}
.field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:14px;color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:16px;outline:none;transition:border-color .15s;-webkit-appearance:none;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
.field textarea{resize:vertical;min-height:90px;font-size:14px;}
select option{background:var(--surface2);}

/* TYPE PILLS */
.type-pills{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.tpill{padding:11px 12px;border-radius:10px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;border:1px solid var(--border2);color:var(--text2);text-transform:uppercase;text-align:center;font-weight:500;}
.tpill.sel-drill{border-color:var(--green);color:var(--green);background:var(--gdim);}
.tpill.sel-doc{border-color:var(--blue);color:var(--blue);background:var(--bdim);}
.tpill.sel-reg{border-color:var(--purple);color:var(--purple);background:var(--pdim);}
.tpill.sel-fin{border-color:var(--accent);color:var(--accent);background:var(--adim);}

/* ACCESS CHECKS */
.acheck-list{display:flex;flex-direction:column;gap:8px;}
.acheck-item{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;cursor:pointer;}
.acheck-item.checked{border-color:var(--accent);background:var(--adim);}
.acheck-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent);flex-shrink:0;}
.acheck-name{font-size:13px;font-weight:500;color:var(--text);}
.acheck-loc{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text2);}

/* UPLOAD */
.upload-zone{border:2px dashed var(--border2);border-radius:12px;padding:24px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface2);margin-bottom:14px;}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--accent);background:var(--adim);}
.upload-zone input[type=file]{display:none;}
.upload-icon{font-size:32px;margin-bottom:8px;color:var(--text2);}
.upload-label{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text2);line-height:1.6;}
.upload-label span{color:var(--accent);}
.upload-progress{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px;display:none;}
.upload-progress-bar{height:6px;background:var(--border2);border-radius:3px;overflow:hidden;margin-top:8px;}
.upload-progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s ease;width:0%;}
.upload-filename{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text2);}

/* DOCS TABLE */
.doc-row{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.doc-row:last-child{border-bottom:none;}
.doc-ext{width:36px;height:42px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:10px;flex-shrink:0;letter-spacing:.5px;}
.ext-pdf{background:var(--rdim);color:var(--red);border:1px solid rgba(248,113,113,.25);}
.ext-png,.ext-jpg,.ext-jpeg{background:var(--adim);color:var(--accent);border:1px solid rgba(232,160,32,.25);}
.ext-xlsx,.ext-csv,.ext-kml{background:var(--gdim);color:var(--green);border:1px solid rgba(74,222,128,.25);}
.ext-dwg,.ext-dxf{background:var(--bdim);color:var(--blue);border:1px solid rgba(56,189,248,.25);}
.ext-other{background:var(--pdim);color:var(--purple);border:1px solid rgba(168,85,247,.25);}
.doc-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.doc-meta{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text2);margin-top:2px;}
.doc-del{margin-left:auto;flex-shrink:0;}

/* INFO ROWS */
.info-row{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--border);}
.info-row:last-child{border-bottom:none;}
.info-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;}
.info-val{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text);text-align:right;}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px;overflow-x:auto;}
.tab{padding:11px 16px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;white-space:nowrap;font-weight:500;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-content{display:none;}
.tab-content.active{display:block;}

/* UPDATE LOG */
.uli{display:flex;gap:10px;padding:14px 0;border-bottom:1px solid var(--border);}
.uli:last-child{border-bottom:none;}
.uli-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.uli-type{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;font-weight:600;}
.uli-text{font-size:13px;line-height:1.6;color:var(--text);}
.uli-time{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text2);margin-top:3px;}

/* MISC */
.back-btn{display:inline-flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text2);cursor:pointer;margin-bottom:16px;padding:10px 14px;border:1px solid var(--border2);border-radius:10px;background:var(--surface);font-weight:500;}
.tag{padding:5px 10px;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:10px;border:1px solid var(--border2);color:var(--text2);}
.ddh-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;color:var(--text);}
.ddh-meta{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text2);margin:5px 0 14px;}
.ddh-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text2);font-family:'IBM Plex Mono',monospace;font-size:12px;gap:10px;}
.spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{padding:32px 16px;text-align:center;color:var(--text2);font-family:'IBM Plex Mono',monospace;font-size:12px;line-height:2;}
.toast{position:fixed;bottom:calc(var(--nav-h) + 12px);left:16px;right:16px;background:var(--surface);border:1px solid var(--accent);border-radius:12px;padding:14px 18px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--accent);z-index:500;transform:translateY(20px);opacity:0;transition:all .3s ease;text-align:center;font-weight:600;}
.toast.show{transform:translateY(0);opacity:1;}
.update-form-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:16px;}
@media(min-width:600px){.stats-grid{grid-template-columns:repeat(4,1fr);}.content{padding:20px 24px;}.type-pills{grid-template-columns:repeat(4,1fr);}}
</style>
</head>
<body>

<!-- AUTH -->
<div class="auth-screen" id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">WellTrack</div>
    <div class="auth-sub">Admin Portal</div>
    <div class="auth-error" id="auth-error"></div>
    <label class="auth-label">Email</label>
    <input class="auth-input" type="email" id="login-email" placeholder="admin@yourcompany.com" autocomplete="email"/>
    <label class="auth-label">Password</label>
    <input class="auth-input" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="auth-btn" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="topbar">
    <div class="topbar-logo">WellTrack</div>
    <div class="topbar-right">
      <div class="topbar-email" id="topbar-email"></div>
      <div class="logout-btn" onclick="doLogout()">⎋</div>
    </div>
  </div>

  <div class="content" id="app-content">
    <!-- DASHBOARD -->
    <div class="view active" id="view-dashboard">
      <div class="stats-grid">
        <div class="stat-card gold"><div class="stat-label">Total Deals</div><div class="stat-value" id="stat-deals">—</div></div>
        <div class="stat-card green"><div class="stat-label">Drilling</div><div class="stat-value" id="stat-drilling">—</div></div>
        <div class="stat-card blue"><div class="stat-label">Promoters</div><div class="stat-value" id="stat-promoters">—</div></div>
        <div class="stat-card red"><div class="stat-label">Fundraising</div><div class="stat-value" id="stat-fundraising">—</div></div>
      </div>
      <div class="sec-header"><div class="sec-title">Deals</div><button class="btn btn-primary btn-sm" onclick="openNewDeal()">+ New Deal</button></div>
      <div id="dash-deals"></div>
      <div class="sec-header"><div class="sec-title">Recent Updates</div><button class="btn btn-ghost btn-sm" onclick="showView('updates')">Post →</button></div>
      <div id="dash-updates"></div>
    </div>

    <!-- ALL DEALS -->
    <div class="view" id="view-deals">

        <option>Executive Summary</option>

        <option>Cross Section</option>
        <option>Well Path</option>
        <option>AFE Budget</option>
        <option>Permit</option>

        <option>Financial Update</option>
        <option>Other</option>
      </select>
    </div>
    <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropFile(event)">
      <input type="file" id="file-input" onchange="fileSelected(this)" accept=".pdf,.png,.jpg,.jpeg,.xlsx,.csv,.dwg,.dxf,.kml,.doc,.docx"/>
      <div class="upload-icon">📁</div>
      <div class="upload-label">Tap to browse files<br><span>or drag and drop here</span><br><br>PDF, PNG, JPG, XLSX, DWG, KML supported</div>
    </div>
    <div class="upload-progress" id="upload-progress">
      <div class="upload-filename" id="upload-filename">Uploading…</div>
      <div class="upload-progress-bar"><div class="upload-progress-fill" id="upload-progress-fill"></div></div>
    </div>`;
  document.getElementById('sheet-save').style.display='none';
  document.getElementById('sheet-overlay').classList.add('open');
}

function dragOver(e){e.preventDefault();document.getElementById('upload-zone').classList.add('dragover');}
function dragLeave(e){document.getElementById('upload-zone').classList.remove('dragover');}
function dropFile(e){e.preventDefault();document.getElementById('upload-zone').classList.remove('dragover');const f=e.dataTransfer.files[0];if(f)uploadFile(f);}
function fileSelected(input){if(input.files[0])uploadFile(input.files[0]);}

async function uploadFile(file){
  const dealId=g('upload-deal-id');
  const docType=g('upload-doc-type');
  if(!dealId){toast('Select a deal first.');return;}

  // Show progress
  const prog=document.getElementById('upload-progress');
  const fill=document.getElementById('upload-progress-fill');
  const fname=document.getElementById('upload-filename');
  prog.style.display='block';
  fname.textContent=file.name;
  fill.style.width='10%';

  // Upload to Supabase storage
  const filePath=`${dealId}/${Date.now()}_${file.name}`;
  fill.style.width='40%';

  const{data:storageData,error:storageErr}=await sb.storage.from('documents').upload(filePath,file,{cacheControl:'3600',upsert:false});
  if(storageErr){toast('Upload failed: '+storageErr.message);prog.style.display='none';return;}
  fill.style.width='75%';

  // Get public URL
  const{data:urlData}=sb.storage.from('documents').getPublicUrl(filePath);
  const publicUrl=urlData?.publicUrl||'';
  fill.style.width='90%';

  // Save to documents table
  const{error:dbErr}=await sb.from('documents').insert({
    deal_id:dealId,
    name:file.name,
    file_type:file.name.split('.').pop().toLowerCase(),
    doc_type:docType,
    file_size:formatFileSize(file.size),
    url:publicUrl,
    file_path:filePath
  });

  if(dbErr){toast('DB error: '+dbErr.message);prog.style.display='none';return;}
  fill.style.width='100%';

  setTimeout(()=>{
    closeSheet();
    document.getElementById('sheet-save').style.display='';
    toast('✓ Document uploaded successfully');
    // Refresh docs tab if open
    const docsTab=document.getElementById('dtab-docs');
    if(docsTab&&docsTab.classList.contains('active'))loadDocs(dealId);
  },400);
}

function formatFileSize(bytes){if(bytes>=1e6)return(bytes/1e6).toFixed(1)+' MB';if(bytes>=1000)return Math.round(bytes/1000)+' KB';return bytes+' B';}

async function deleteDoc(docId,filePath,dealId){
  if(!confirm('Delete this document?'))return;
  if(filePath)await sb.storage.from('documents').remove([filePath]);
  await sb.from('documents').delete().eq('id',docId);
  loadDocs(dealId);toast('Document deleted');
}

function openEditDeal(id){const d=deals.find(x=>x.id===id);document.getElementById('sheet-title').textContent='Edit Deal';document.getElementById('sheet-body').innerHTML=dealFormHTML(d);document.getElementById('sheet-save').onclick=()=>updateDeal(id);document.getElementById('sheet-save').textContent='Save';document.getElementById('sheet-save').style.display='';openSheet();}
function dealPayload(){return{name:g('fn'),location:g('fl'),formation:g('ff'),operator:g('fo'),api_number:g('fa'),status:g('fs'),target_depth:g('fd'),raise_target:parseFloat(g('ft'))||0,raise_committed:parseFloat(g('fc'))||0,notes:g('fno'),updated_at:new Date().toISOString()};}
async function saveDeal(){const p=dealPayload();if(!p.name){toast('Name required.');return;}const{error}=await sb.from('deals').insert(p);if(error){toast('Error: '+error.message);return;}closeSheet();await loadDeals();renderDashboard();toast('✓ Deal created');}
async function updateDeal(id){const p=dealPayload();const{error}=await sb.from('deals').update(p).eq('id',id);if(error){toast('Error: '+error.message);return;}closeSheet();await loadDeals();renderDashboard();if(document.getElementById('view-deals').classList.contains('active'))renderDealList('all-deals',deals);toast('✓ Updated');}
async function deleteDeal(id){if(!confirm('Delete this deal and all its documents?'))return;const{data:docs}=await sb.from('documents').select('file_path').eq('deal_id',id);if(docs&&docs.length){const paths=docs.map(d=>d.file_path).filter(Boolean);if(paths.length)await sb.storage.from('documents').remove(paths);}await sb.from('deals').delete().eq('id',id);await loadDeals();renderDashboard();renderDealList('all-deals',deals);toast('Deleted');}

// ── PROMOTERS ──
function renderPromoters(){
  const el=document.getElementById('promoters-list');
  if(!promoters.length){el.innerHTML='<div class="empty">No promoters yet.</div>';return;}
  el.innerHTML=`<div class="panel">${promoters.map((p,i)=>`<div class="prow"><div class="pavatar" style="background:${PC[i%PC.length]}">${(p.name||'?').slice(0,2).toUpperCase()}</div><div style="flex:1;overflow:hidden;"><div class="pname">${p.name}</div><div class="pmeta">${p.company||''}</div><div class="pmeta">${p.email}</div></div><div class="pactions"><div class="ibtn" onclick="copyLink()" title="Copy link" style="font-size:16px;">🔗</div><div class="ibtn" onclick="openAssign('${p.id}','${p.name.replace(/'/g,"\\'")}')">🔑</div><div class="ibtn" onclick="deletePromoter('${p.id}')" style="color:var(--red);">✕</div></div></div>`).join('')}</div>`;
}
async function renderAccess(){
  const{data:ar}=await sb.from('deal_access').select('deal_id,promoter_id,deals(name)');
  const el=document.getElementById('access-panel');if(!el)return;
  if(!promoters.length){el.innerHTML='';return;}
  el.innerHTML=promoters.map((p,i)=>{
    const a=(ar||[]).filter(x=>x.promoter_id===p.id);
    return`<div class="acard"><div class="ahead"><div style="display:flex;align-items:center;gap:10px;"><div class="pavatar" style="background:${PC[i%PC.length]};width:32px;height:32px;font-size:12px;">${(p.name||'?').slice(0,2).toUpperCase()}</div><div><div style="font-weight:600;font-size:13px;color:var(--text);">${p.name}</div><div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text2);">${a.length} deal${a.length!==1?'s':''}</div></div></div><button class="btn btn-ghost btn-sm" onclick="openAssign('${p.id}','${p.name.replace(/'/g,"\\'")}')">Manage</button></div><div class="achips">${a.length?a.map(x=>`<div class="chip">⬡ ${x.deals?.name||'Deal'}</div>`).join(''):'<span style="font-family:\'IBM Plex Mono\',monospace;font-size:11px;color:var(--text2);">No deals assigned</span>'}</div></div>`;
  }).join('');
}
function openNewPromoter(){
  document.getElementById('sheet-title').textContent='Add Promoter';
  document.getElementById('sheet-body').innerHTML=`<div class="field"><label>Full Name</label><input id="pn" placeholder="John Smith"/></div><div class="field"><label>Company</label><input id="pc" placeholder="Firm name"/></div><div class="field"><label>Email Address</label><input id="pe" type="email" placeholder="promoter@firm.com"/></div><div class="field"><label>Temporary Password</label><input id="pp" type="password" placeholder="Min 8 characters"/></div><div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text2);line-height:1.7;">Send them the <strong style="color:var(--accent);">promoter.html</strong> link. They sign up and only see deals you assign.</div>`;
  document.getElementById('sheet-save').onclick=savePromoter;document.getElementById('sheet-save').textContent='Add Promoter';document.getElementById('sheet-save').style.display='';openSheet();
}
async function savePromoter(){
  const name=g('pn'),company=g('pc'),email=g('pe'),pass=g('pp');
  if(!name||!email||!pass){toast('Name, email & password required.');return;}
  const{data:sd}=await sb.auth.signUp({email,password:pass});
  const userId=sd?.user?.id||null;
  const{error}=await sb.from('promoters').insert({name,company,email,user_id:userId});
  if(error){toast('Error: '+error.message);return;}
  closeSheet();await loadPromoters();renderPromoters();renderAccess();toast('✓ Promoter added');
}
async function deletePromoter(id){if(!confirm('Remove this promoter?'))return;await sb.from('deal_access').delete().eq('promoter_id',id);await sb.from('promoters').delete().eq('id',id);await loadPromoters();renderPromoters();renderAccess();toast('Removed');}
async function openAssign(pid,pname){
  const{data:cur}=await sb.from('deal_access').select('deal_id').eq('promoter_id',pid);
  const asgnd=(cur||[]).map(a=>a.deal_id);
  document.getElementById('sheet-title').textContent=pname;
  document.getElementById('sheet-body').innerHTML=`<div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text2);margin-bottom:16px;">Check deals this promoter can see in their portal.</div><div class="acheck-list">${deals.map(d=>`<div class="acheck-item${asgnd.includes(d.id)?' checked':''}" onclick="toggleCheck(this,'${d.id}')"><input type="checkbox" ${asgnd.includes(d.id)?'checked':''} onclick="event.stopPropagation()"/><div><div class="acheck-name">${d.name}</div><div class="acheck-loc">${d.location||''} · ${d.status}</div></div></div>`).join('')}</div>`;
  document.getElementById('sheet-save').onclick=()=>saveAccess(pid);document.getElementById('sheet-save').textContent='Save Access';document.getElementById('sheet-save').style.display='';openSheet();
}
function toggleCheck(el){el.classList.toggle('checked');el.querySelector('input').checked=el.classList.contains('checked');}
async function saveAccess(pid){
  const items=document.querySelectorAll('.acheck-list .acheck-item');
  const grant=[];
  items.forEach(item=>{if(item.classList.contains('checked')){const m=item.getAttribute('onclick').match(/'([a-f0-9-]{36})'/);if(m)grant.push(m[1]);}});
  await sb.from('deal_access').delete().eq('promoter_id',pid);
  if(grant.length)await sb.from('deal_access').insert(grant.map(did=>({deal_id:did,promoter_id:pid})));
  closeSheet();renderAccess();toast('✓ Access saved');
}

// ── POST UPDATE ──
function setUpdateType(el,type){updateType=type;document.querySelectorAll('.tpill').forEach(p=>p.className='tpill');const cls={drilling:'sel-drill',documents:'sel-doc',regulatory:'sel-reg',financial:'sel-fin'};el.classList.add(cls[type]);}
async function postUpdate(){
  const dealId=g('update-deal'),message=document.getElementById('update-msg').value.trim();
  if(!dealId){toast('Select a deal.');return;}if(!message){toast('Enter a message.');return;}
  const{error}=await sb.from('updates').insert({deal_id:dealId,update_type:updateType,message});
  if(error){toast('Error: '+error.message);return;}
  document.getElementById('update-msg').value='';renderUpdatesHistory();renderRecentUpdates();toast('✓ Update posted');
}
async function deleteUpdate(id){if(!confirm('Delete?'))return;await sb.from('updates').delete().eq('id',id);renderUpdatesHistory();toast('Deleted');}
function copyLink(){const base=window.location.href.replace('index.html','').replace(/\/$/,'');navigator.clipboard.writeText(base+'/promoter.html').catch(()=>{});toast('🔗 Portal link copied');}

// ── SHEET / TABS / UTILS ──
function openSheet(){document.getElementById('sheet-overlay').classList.add('open');}
function closeSheet(){document.getElementById('sheet-overlay').classList.remove('open');}
function switchTab(el,tid){el.closest('.tabs').querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('#view-detail-tmp .tab-content').forEach(t=>t.classList.remove('active'));el.classList.add('active');document.getElementById(tid).classList.add('active');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3200);}

sb.auth.getSession().then(async({data:{session}})=>{
  if(!session){return;}
  // Must verify admin — never auto-login without this check
  const{data:a}=await sb.from('admin_users').select('id').single();
  if(!a){
    await sb.auth.signOut();
    window.location.href='promoter.html';
    return;
  }
  user=session.user;
  showApp();
});
</script>
</body>
